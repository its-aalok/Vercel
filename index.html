<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Esports Bracket Arena</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: #334155;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --winner-color: #10b981;
            --loser-color: #ef4444;
            --removed-color: #f59e0b;
            --neon-glow: rgba(59, 130, 246, 0.5);
            --purple-glow: rgba(168, 85, 247, 0.5);
        }

        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; overflow-x: hidden; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .container { max-width: 1600px; margin: 0 auto; position: relative; }
        h1 { text-align: center; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; text-shadow: 0 0 30px rgba(96, 165, 250, 0.2); }
        
        .setup-section { background: var(--card-bg); backdrop-filter: blur(12px); padding: 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .setup-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .setup-controls { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; flex: 1; }
        .input-bucket { display: flex; gap: 8px; }
        .player-chips-grid { display: flex; flex-wrap: wrap; gap: 8px; max-width: 550px; }
        
        .player-chip { background: rgba(30, 41, 59, 0.9); border: 1px solid var(--border-color); color: #60a5fa; padding: 8px 14px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .player-chip .remove-chip-btn { color: var(--loser-color); cursor: pointer; font-weight: 800; font-size: 15px; }
        .save-status { display: inline-block; margin-top: 15px; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); color: #38bdf8; margin-right: 10px; }
        
        input { background-color: rgba(15, 23, 42, 0.8); color: var(--text-color); padding: 12px 16px; font-size: 15px; border-radius: 6px; border: 1px solid var(--border-color); width: 200px; }
        button { padding: 12px 24px; font-size: 15px; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; transition: all 0.2s ease; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5); }
        .btn-secondary-action { background: #1e293b; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-secondary-action:hover:not(:disabled) { background: #334155; border-color: #475569; }
        .btn-success { background: linear-gradient(135deg, #a855f7, #7e22ce); color: white; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3); animation: startPulse 1.5s infinite alternate; }
        @keyframes startPulse { 0% { box-shadow: 0 0 8px rgba(168, 85, 247, 0.4); } 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.8); } }
        .btn-danger { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); color: #f87171; padding: 8px 14px; font-size: 13px; font-weight: 500; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.18); border-color: rgba(239, 68, 68, 0.5); color: #ef4444; }
        
        .round-toolbar { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; margin-bottom: 25px; backdrop-filter: blur(8px); }
        .toolbar-label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-right: 10px; }
        .round-nav-btn { background: rgba(30, 41, 59, 0.6); border: 1px solid var(--border-color); color: #94a3b8; padding: 6px 14px; font-size: 13px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .round-nav-btn:hover { background: rgba(59, 130, 246, 0.15); border-color: var(--accent-color); color: #60a5fa; }
        
        .global-layout-grid { display: grid; grid-template-columns: 1fr 320px; gap: 40px; width: 100%; max-width: 100%; }
        
        .sidebar-container { 
            position: sticky; 
            top: 25px; 
            align-self: start; 
            max-height: calc(100vh - 50px); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            overflow-y: auto; 
            scrollbar-width: thin;
        }
        .sidebar-container::-webkit-scrollbar { width: 4px; }
        .sidebar-container::-webkit-scrollbar-track { background: transparent; }
        .sidebar-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .bracket-container { display: flex; flex-direction: column; gap: 50px; min-width: 0; }
        .bracket-section { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); padding: 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.03); position: relative; }
        .bracket-section h2 { margin-top: 0; font-size: 1.25rem; letter-spacing: -0.02em; color: #94a3b8; border-left: 4px solid var(--accent-color); padding-left: 10px; }
        
        .svg-container { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .connector-line { stroke: #334155; stroke-width: 2; fill: none; transition: stroke 0.3s; }
        .connector-line.highlight { stroke: var(--accent-color); stroke-width: 3; }
        
        .tournament-grid { display: flex; gap: 60px; align-items: center; padding: 20px 0; overflow-x: auto; position: relative; z-index: 2; scroll-behavior: smooth; max-width: 100%; width: max-content; }
        .tournament-grid::-webkit-scrollbar { height: 6px; width: 6px; }
        .tournament-grid::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.4); border-radius: 4px; }
        .tournament-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .tournament-grid::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        
        .round { display: flex; flex-direction: column; justify-content: space-around; gap: 24px; min-width: 220px; height: 100%; }
        
        .matchup { background: #111827; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.4s ease; }
        .matchup.in-progress { border-color: #60a5fa; animation: livePulse 2s infinite alternate; box-shadow: 0 0 20px var(--neon-glow); }
        .matchup.paused { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
        .matchup.completed-match { background: rgba(15, 23, 42, 0.85); border-color: rgba(51, 65, 85, 0.4); opacity: 0.65; box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.6); }
        @keyframes livePulse { 0% { box-shadow: 0 0 8px rgba(59, 130, 246, 0.3); } 100% { box-shadow: 0 0 22px rgba(59, 130, 246, 0.7); } }
        
        .match-title { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-align: center; background: #030712; padding: 8px 4px; color: #475569; border-bottom: 1px solid var(--border-color); cursor: not-allowed; transition: all 0.2s; }
        body.status-active .matchup:not(.completed-match) .match-title { cursor: pointer; color: #94a3b8; }
        body.status-active .matchup:not(.completed-match) .match-title:hover { background: #1f2937; color: #60a5fa; }
        body.status-active .matchup.in-progress .match-title { background: #1e3a8a; color: #93c5fd; }
        body.status-active .matchup.paused .match-title { background: #451a03; color: #fbbf24; border-color: #f59e0b; }
        .matchup.completed-match .match-title { cursor: not-allowed; background: #090d16; color: #475569; }
        
        .live-dot { display: inline-block; width: 7px; height: 7px; background-color: #ef4444; border-radius: 50%; margin-left: 6px; vertical-align: middle; position: relative; top: -1px; animation: liveBlink 0.8s infinite alternate; }
        @keyframes liveBlink { 0% { opacity: 0.4; box-shadow: 0 0 0px #ef4444; } 100% { opacity: 1; box-shadow: 0 0 6px #ef4444, 0 0 10px #ef4444; } }
        
        .player { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; color: #94a3b8; cursor: not-allowed; transition: all 0.2s; }
        .player:first-of-type { border-bottom: 1px solid var(--border-color); }
        .player.won { color: var(--winner-color) !important; font-weight: 700; background: rgba(16, 185, 129, 0.03); }
        .player.lost { color: #475569 !important; text-decoration: line-through; }
        .tbd-text { color: #475569; font-style: italic; font-weight: 400; }
        .bye { color: #475569; font-style: italic; }
        .breaker-icon { color: #f59e0b; margin-left: 6px; font-size: 13px; }
        
        .live-widget { background: #0f172a; border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; flex-shrink: 0; }
        .live-widget.active { border-color: #3b82f6; box-shadow: 0 0 25px rgba(59, 130, 246, 0.25); }
        .live-widget.completed-dashboard { border-color: #10b981; box-shadow: 0 0 25px rgba(16, 185, 129, 0.2); }
        
        .widget-header { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .widget-badge { background-color: #1e293b; padding: 4px 8px; border-radius: 4px; color: #94a3b8; }
        
        .live-widget.active .widget-badge { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); animation: blinker 1.5s infinite alternate; }
        .live-widget.completed-dashboard .widget-badge { background-color: rgba(16, 185, 129, 0.2); color: #10b981; }
        @keyframes blinker { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .widget-player-btn { background-color: #111827; border: 1px solid var(--border-color); color: var(--text-color); padding: 14px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .live-widget.active .widget-player-btn:hover { background: linear-gradient(135deg, #1e293b, #334155); border-color: #60a5fa; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.2); }
        .widget-player-btn.selected-winner { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important; color: #10b981 !important; }
        .widget-vs { font-size: 11px; color: #475569; text-align: center; margin: 6px 0; font-weight: 700; }
        
        .break-btn { flex: 1; text-align: center; padding: 8px; font-size: 11px; color: #64748b; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .break-btn:hover { background: rgba(245, 158, 11, 0.1); color: #94a3b8; }
        
        .btn-toss { background: linear-gradient(135deg, #4f46e5, #3b82f6); color: white; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 700; transition: all 0.2s; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-toss:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(59, 130, 246, 0.4); }
        .toss-result { text-align: center; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: #f59e0b; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 13px; margin-bottom: 20px; letter-spacing: 0.05em; text-transform: uppercase; }

        .btn-confirm { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.25); color: #10b981; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 700; transition: all 0.2s; margin-top: 20px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; width: 100%; box-sizing: border-box; }
        .btn-confirm:hover { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.5); color: #34d399; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15); }
        
        .btn-success-widget { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 700; transition: all 0.2s; margin-top: 15px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); font-size: 13px; }
        .btn-success-widget:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4); background: linear-gradient(135deg, #34d399, #10b981); }

        .stats-widget { background: #0f172a; border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; flex-shrink: 0; }
        .stats-header { padding: 15px 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #1e293b; border-bottom: 1px solid transparent; transition: all 0.2s; }
        .stats-header:hover { color: #f8fafc; background: #334155; }
        .stats-header.open { border-bottom-color: var(--border-color); }
        .stats-body { display: none; }
        .stats-body.open { display: block; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .stats-table th { background: #030712; color: #64748b; font-weight: 700; text-align: center; padding: 10px; border-bottom: 1px solid var(--border-color); }
        .stats-table th:first-child { text-align: left; padding-left: 20px; }
        .stats-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(51, 65, 85, 0.5); color: #e2e8f0; }
        .stats-table td:first-child { text-align: left; padding-left: 20px; font-weight: 600; color: #93c5fd; }
        .stats-table tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <h1>Double Elimination Tournament Arena</h1>
    
    <div class="setup-section">
        <div class="setup-row">
            <div class="setup-controls">
                <div class="input-bucket" id="playerEntryBox">
                    <input type="text" id="onePlayerInput" placeholder="Enter player name...">
                    <button id="addPlayerBtn" class="btn-secondary-action" onclick="addSinglePlayer()">Add</button>
                </div>
                <div id="playerChipsContainer" class="player-chips-grid"></div>
                
                <button id="genBtn" class="btn-primary" onclick="generateBracket()">Create Bracket</button>
                <button id="startBtn" class="btn-success" onclick="startTournament()" style="display: none;">Start Tournament</button>
            </div>
            <div>
                <button id="topResetBtn" class="btn-danger" onclick="freshStartTournamentReset()">Reset & Start Fresh</button>
            </div>
        </div>
        <div>
            <div id="saveStatus" class="save-status">📋 System Booted</div>
        </div>
    </div>

    <div id="roundNavToolbar" class="round-toolbar" style="display: none;">
        <span class="toolbar-label">Arena Viewport Track:</span>
        <div id="toolbarButtonsWrapper" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
    </div>

    <div id="bracketsDisplay" class="global-layout-grid" style="display: none;">
        
        <div class="bracket-container">
            <div id="winnersSection" class="bracket-section">
                <h2>Upper Bracket (Winners)</h2>
                <div id="winnersGrid" class="tournament-grid">
                    <svg id="winnersSVG" class="svg-container"></svg>
                </div>
            </div>

            <div id="losersSection" class="bracket-section">
                <h2>Lower Bracket (Losers)</h2>
                <div id="losersGrid" class="tournament-grid">
                    <svg id="losersSVG" class="svg-container"></svg>
                </div>
            </div>

            <div id="grandFinalsSection" class="bracket-section">
                <h2>Grand Finals</h2>
                <div id="grandFinalsGrid" class="tournament-grid" style="justify-content: center;"></div>
            </div>
        </div>

        <div class="sidebar-container">
            <div id="liveMatchWidget" class="live-widget">
                <div class="widget-header">
                    <span>LIVE DASHBOARD</span>
                    <span id="widgetBadge" class="widget-badge">OFFLINE</span>
                </div>
                <div id="widgetBody" class="widget-body">
                    <div id="widgetPlaceholderMsg" style="color: #475569; font-size: 13px; text-align: center; padding: 20px 0;">
                        Select an available match header inside the tree to begin.
                    </div>
                </div>
            </div>

            <div id="statsWidget" class="stats-widget" style="display: none;">
                <div id="statsHeader" class="stats-header" onclick="toggleStats()">
                    <span>📊 Tournament Leaderboard</span>
                    <span id="statsIcon">▼</span>
                </div>
                <div id="statsBody" class="stats-body">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>P</th>
                                <th>W</th>
                                <th>L</th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
        
    </div>
</div>

<script>
    let tournamentData = {
        players: [],
        winnersRounds: [],
        losersRounds: [],
        grandFinal: null,
        activeMatchId: null,
        activeMatchMetadata: null,
        pendingWinner: null,
        bracketResetPlayed: false, 
        status: "empty" 
    };

    let stagedPlayers = ["Alice", "Bob", "Charlie", "Dave"];

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = Math.random() * 0.2 - 0.1;
            this.speedY = Math.random() * 0.2 - 0.1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = 'rgba(96, 165, 250, 0.15)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }
    for(let i=0; i<60; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    function addSinglePlayer() {
        if (tournamentData.status !== "empty") return;
        const inputEl = document.getElementById('onePlayerInput');
        const value = inputEl.value.trim();
        if (!value) return;

        if (stagedPlayers.some(p => p.toLowerCase() === value.toLowerCase())) { 
            alert("This name is already in the tournament pool."); 
            return; 
        }

        stagedPlayers.push(value);
        inputEl.value = '';
        inputEl.focus(); 
        renderPlayerChips();
    }

    function removeSinglePlayer(index) {
        if (tournamentData.status !== "empty") return;
        stagedPlayers.splice(index, 1);
        renderPlayerChips();
    }

    function renderPlayerChips() {
        const container = document.getElementById('playerChipsContainer');
        container.innerHTML = '';
        
        const isLocked = tournamentData.status !== "empty";
        
        stagedPlayers.forEach((player, idx) => {
            const chip = document.createElement('div');
            chip.className = 'player-chip';
            chip.innerHTML = `<span>${player}</span>`;
            
            if (!isLocked) {
                const removeBtn = document.createElement('span');
                removeBtn.className = 'remove-chip-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = () => removeSinglePlayer(idx);
                chip.appendChild(removeBtn);
            }
            container.appendChild(chip);
        });

        document.getElementById('playerEntryBox').style.display = isLocked ? 'none' : 'flex';
    }

    document.getElementById('onePlayerInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { addSinglePlayer(); }
    });

    function toggleStats() {
        const body = document.getElementById('statsBody');
        const header = document.getElementById('statsHeader');
        const icon = document.getElementById('statsIcon');
        
        if (body.classList.contains('open')) {
            body.classList.remove('open');
            header.classList.remove('open');
            icon.innerText = '▼';
        } else {
            body.classList.add('open');
            header.classList.add('open');
            icon.innerText = '▲';
        }
    }

    function renderStatsTable() {
        if (tournamentData.status === "empty") {
            document.getElementById('statsWidget').style.display = 'none';
            return;
        }
        document.getElementById('statsWidget').style.display = 'block';

        let stats = {};
        let rankScore = {}; 

        tournamentData.players.forEach(p => {
            stats[p] = { played: 0, won: 0, lost: 0 };
            rankScore[p] = 50; 
        });

        const processMatch = (m) => {
            if (!m || !m.winner || m.status !== 'completed') return;
            if (m.p1 === "BYE" || m.p2 === "BYE") return;
            
            if (stats[m.p1]) stats[m.p1].played++;
            if (stats[m.p2]) stats[m.p2].played++;
            if (stats[m.winner]) stats[m.winner].won++;
            if (stats[m.loser]) stats[m.loser].lost++;
        };

        tournamentData.winnersRounds.forEach(r => r.forEach(processMatch));
        
        tournamentData.losersRounds.forEach((round, rIdx) => {
            round.forEach(m => {
                processMatch(m);
                if (m.status === 'completed' && m.loser && m.loser !== "BYE") {
                    rankScore[m.loser] = rIdx + 1; 
                }
            });
        });
        
        if (tournamentData.grandFinal) {
            if (tournamentData.bracketResetPlayed) {
                let finalWinnersRound = tournamentData.winnersRounds[tournamentData.winnersRounds.length - 1];
                let finalLosersRound = tournamentData.losersRounds[tournamentData.losersRounds.length - 1];
                let wChamp = finalWinnersRound ? finalWinnersRound[0].winner : null;
                let lChamp = finalLosersRound ? finalLosersRound[0].winner : null;
                
                if (wChamp && stats[wChamp]) { stats[wChamp].played++; stats[wChamp].lost++; }
                if (lChamp && stats[lChamp]) { stats[lChamp].played++; stats[lChamp].won++; }
            }
            processMatch(tournamentData.grandFinal);
            
            if (tournamentData.grandFinal.status === 'completed') {
                rankScore[tournamentData.grandFinal.loser] = 100; 
                rankScore[tournamentData.grandFinal.winner] = 200; 
            }
        }

        let sortedPlayers = Object.keys(stats).sort((a, b) => {
            if (rankScore[b] !== rankScore[a]) return rankScore[b] - rankScore[a];
            if (stats[b].won !== stats[a].won) return stats[b].won - stats[a].won;
            return stats[a].lost - stats[b].lost; 
        });

        let tbody = '';
        sortedPlayers.forEach((p, index) => {
            tbody += `<tr>
                <td><span style="color: #64748b; margin-right: 12px; font-size: 10px; font-weight: 800;">${index + 1}</span> ${p}</td>
                <td>${stats[p].played}</td>
                <td>${stats[p].won}</td>
                <td>${stats[p].lost}</td>
            </tr>`;
        });

        document.getElementById('statsTableBody').innerHTML = tbody;
    }

    function executeMatchAutoRules(match) {
        if (!match || match.winner) return;
        if (match.p1 === "BYE" && match.p2 && match.p2 !== "BYE") { match.winner = match.p2; match.loser = "BYE"; match.status = "completed"; }
        else if (match.p2 === "BYE" && match.p1 && match.p1 !== "BYE") { match.winner = match.p1; match.loser = "BYE"; match.status = "completed"; }
        else if (match.p1 === "BYE" && match.p2 === "BYE") { match.winner = "BYE"; match.loser = "BYE"; match.status = "completed"; }
    }

    function propagateBrackets() {
        for (let pass = 0; pass < 6; pass++) {
            for (let rIdx = 0; rIdx < tournamentData.winnersRounds.length; rIdx++) {
                tournamentData.winnersRounds[rIdx].forEach((match, i) => {
                    executeMatchAutoRules(match);
                    if (match.winner) {
                        let nextRound = tournamentData.winnersRounds[rIdx + 1];
                        if (nextRound) {
                            let nextMatchIdx = Math.floor(i / 2);
                            let slot = (i % 2 === 0) ? 'p1' : 'p2';
                            if (nextRound[nextMatchIdx]) {
                                nextRound[nextMatchIdx][slot] = match.winner;
                            }
                        }
                        if (tournamentData.losersRounds.length > 0) {
                            let targetLosersRoundIdx = rIdx === 0 ? 0 : (rIdx * 2 - 1);
                            let targetRound = tournamentData.losersRounds[targetLosersRoundIdx];
                            if (targetRound) {
                                let targetMatchIdx = Math.floor(i / (rIdx === 0 ? 2 : 1));
                                if (targetRound[targetMatchIdx]) {
                                    if (rIdx === 0) {
                                        let slot = (i % 2 === 0) ? 'p1' : 'p2';
                                        targetRound[targetMatchIdx][slot] = match.loser;
                                    } else {
                                        targetRound[targetMatchIdx].p1 = match.loser;
                                    }
                                }
                            }
                        }
                    }
                });
            }

            for (let rIdx = 0; rIdx < tournamentData.losersRounds.length; rIdx++) {
                tournamentData.losersRounds[rIdx].forEach((match, i) => {
                    executeMatchAutoRules(match);
                    if (match.winner) {
                        let nextRound = tournamentData.losersRounds[rIdx + 1];
                        if (nextRound) {
                            if (rIdx % 2 === 0) {
                                if (nextRound[i]) nextRound[i].p2 = match.winner;
                            } else {
                                let nextMatchIdx = Math.floor(i / 2);
                                let slot = (i % 2 === 0) ? 'p1' : 'p2';
                                if (nextRound[nextMatchIdx]) nextRound[nextMatchIdx][slot] = match.winner;
                            }
                        }
                    }
                });
            }
            
            let finalWinnersRound = tournamentData.winnersRounds[tournamentData.winnersRounds.length - 1];
            let winnersChamp = finalWinnersRound ? finalWinnersRound[0].winner : null;
            let finalLosersRound = tournamentData.losersRounds[tournamentData.losersRounds.length - 1];
            let losersChamp = finalLosersRound ? finalLosersRound[0].winner : null;

            if (winnersChamp) tournamentData.grandFinal.p1 = winnersChamp;
            if (losersChamp) tournamentData.grandFinal.p2 = losersChamp;
            executeMatchAutoRules(tournamentData.grandFinal);
        }
    }

    function focusSpecificRoundColumn(gridId, roundIndex) {
        const grid = document.getElementById(gridId);
        if (!grid) return;

        grid.scrollIntoView({ behavior: 'smooth', block: 'center' });

        const rounds = grid.querySelectorAll('.round');
        if (rounds && rounds[roundIndex]) {
            setTimeout(() => {
                const targetColumn = rounds[roundIndex];
                grid.scrollTo({
                    left: targetColumn.offsetLeft - 40,
                    behavior: 'smooth'
                });
            }, 300);
        }
    }

    function drawConnectors(gridId, svgId) {
        const grid = document.getElementById(gridId);
        const svg = document.getElementById(svgId);
        if (!grid || !svg) return;
        
        const rounds = grid.querySelectorAll('.round');
        if (rounds.length === 0) return;
        
        let totalWidth = 0;
        rounds.forEach(r => totalWidth += r.offsetWidth + 60); 
        
        svg.setAttribute('width', Math.max(grid.clientWidth, totalWidth));
        svg.setAttribute('height', grid.clientHeight);
        svg.innerHTML = ''; 
        
        for (let i = 0; i < rounds.length - 1; i++) {
            const currentRound = rounds[i];
            const nextRound = rounds[i + 1];
            const currentMatches = currentRound.querySelectorAll('.matchup');
            const nextMatches = nextRound.querySelectorAll('.matchup');
            
            currentMatches.forEach((match, index) => {
                const rectA = match.getBoundingClientRect();
                const parentRect = svg.getBoundingClientRect();
                const startX = (rectA.right - parentRect.left);
                const startY = (rectA.top + rectA.height / 2) - parentRect.top;
                
                let targetIndex = Math.floor(index / 2);
                if (gridId === 'losersGrid' && i % 2 === 0) { targetIndex = index; }
                
                const targetMatch = nextMatches[targetIndex];
                if (!targetMatch) return;
                
                const rectB = targetMatch.getBoundingClientRect();
                const endX = rectB.left - parentRect.left;
                const endY = (rectB.top + rectB.height / 2) - parentRect.top;
                const midX = startX + (endX - startX) / 2;
                
                const pathData = `M ${startX} ${startY} L ${midX} ${startY} L ${midX} ${endY} L ${endX} ${endY}`;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                path.setAttribute('class', match.classList.contains('in-progress') ? 'connector-line highlight' : 'connector-line');
                svg.appendChild(path);
            });
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('arenaLifecycleTournamentSave', JSON.stringify(tournamentData));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('arenaLifecycleTournamentSave');
        if (saved) {
            tournamentData = JSON.parse(saved);
            
            const migrateStatus = (m) => { if (m && !m.status) m.status = m.winner ? 'completed' : 'pending'; };
            tournamentData.winnersRounds.forEach(r => r.forEach(migrateStatus));
            tournamentData.losersRounds.forEach(r => r.forEach(migrateStatus));
            if (tournamentData.grandFinal) migrateStatus(tournamentData.grandFinal);

            if (tournamentData.bracketResetPlayed === undefined) tournamentData.bracketResetPlayed = false;
            if (tournamentData.pendingWinner === undefined) tournamentData.pendingWinner = null;
            if (tournamentData.players) { stagedPlayers = [...tournamentData.players]; }
            applyLifecycleUIChanges();
            updateLiveWidget();
            renderBracket();
        } else {
            renderPlayerChips();
        }
    }

    function applyLifecycleUIChanges() {
        const genBtn = document.getElementById('genBtn');
        const startBtn = document.getElementById('startBtn');
        const statusBadge = document.getElementById('saveStatus');
        const displayContainer = document.getElementById('bracketsDisplay');

        document.body.className = `status-${tournamentData.status}`;
        renderPlayerChips(); 
        rebuildToolbarInterface(); 

        if (tournamentData.status === "empty") {
            displayContainer.style.display = 'none'; 
            startBtn.style.display = 'none'; 
            genBtn.style.display = 'inline-block';
            genBtn.disabled = false; 
            statusBadge.innerText = "📋 Standing By"; 
            statusBadge.style.color = "#94a3b8";
        } 
        else if (tournamentData.status === "unstarted") {
            displayContainer.style.display = 'grid'; 
            startBtn.style.display = 'inline-block'; 
            genBtn.style.display = 'none';           
            statusBadge.innerText = "⏳ Bracket Built - Awaiting Start"; 
            statusBadge.style.color = "#a855f7";
        } 
        else if (tournamentData.status === "active") {
            displayContainer.style.display = 'grid'; 
            startBtn.style.display = 'none';         
            genBtn.style.display = 'none';           
            statusBadge.innerText = "⚔️ Tournament In Progress"; 
            statusBadge.style.color = "#38bdf8";
        } 
        else if (tournamentData.status === "completed") {
            displayContainer.style.display = 'grid'; 
            startBtn.style.display = 'none'; 
            genBtn.style.display = 'none'; 
            statusBadge.innerText = "🏆 Tournament Completed"; 
            statusBadge.style.color = "#10b981";
        }
        
        renderStatsTable();
    }

    // 🚀 NEW: Randomized Seeding added via Fisher-Yates Shuffle
    function generateBracket() {
        if (tournamentData.status === "active" || tournamentData.status === "completed") return; 
        if (stagedPlayers.length < 2) { alert("Please add at least 2 players."); return; }

        let shuffledPlayers = [...stagedPlayers];
        for (let i = shuffledPlayers.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledPlayers[i], shuffledPlayers[j]] = [shuffledPlayers[j], shuffledPlayers[i]];
        }

        tournamentData.players = shuffledPlayers;
        tournamentData.activeMatchId = null; 
        tournamentData.activeMatchMetadata = null;
        tournamentData.pendingWinner = null;
        tournamentData.bracketResetPlayed = false;
        tournamentData.status = "unstarted";
        
        buildInitialFixtures(shuffledPlayers);
        propagateBrackets(); 
        applyLifecycleUIChanges();
        updateLiveWidget();
        renderBracket();
        saveToLocalStorage();
    }

    function startTournament() {
        if (tournamentData.status !== "unstarted") return;
        tournamentData.status = "active";
        applyLifecycleUIChanges();
        updateLiveWidget(); 
        saveToLocalStorage();
    }

    function freshStartTournamentReset() {
        let warningText = "Are you sure you want to trigger a fresh start? This completely wipes the bracket cache and resets the roster setup panel.";
        if (tournamentData.status === "active") {
            warningText = "⚠️ WARNING: A tournament is currently IN PROGRESS! Wiping it now will completely delete all ongoing matches and logged match scores. Do you want to proceed?";
        }
        if (!confirm(warningText)) return;
        
        localStorage.removeItem('arenaLifecycleTournamentSave');
        tournamentData = { players: [], winnersRounds: [], losersRounds: [], grandFinal: null, activeMatchId: null, activeMatchMetadata: null, pendingWinner: null, bracketResetPlayed: false, status: "empty" };
        stagedPlayers = ["Alice", "Bob", "Charlie", "Dave"]; 
        applyLifecycleUIChanges();
        updateLiveWidget();
        renderBracket();
    }

    function buildInitialFixtures(players) {
        const nextPowerOfTwo = Math.pow(2, Math.ceil(Math.log2(players.length)));
        const paddedPlayers = [...players];
        while (paddedPlayers.length < nextPowerOfTwo) { paddedPlayers.push("BYE"); }

        let round1Matches = [];
        let matchIndex = 1;
        for (let i = 0; i < paddedPlayers.length; i += 2) {
            let p1 = paddedPlayers[i];
            let p2 = paddedPlayers[i+1];
            round1Matches.push({ id: `W-R1-M${matchIndex++}`, p1, p2, winner: null, loser: null, breaker: null, status: 'pending' });
        }
        tournamentData.winnersRounds = [round1Matches];
        
        let numWinnersRounds = Math.log2(nextPowerOfTwo);
        for (let r = 1; r < numWinnersRounds; r++) {
            let matchesInRound = round1Matches.length / Math.pow(2, r);
            let roundMatches = [];
            for (let m = 0; m < matchesInRound; m++) {
                roundMatches.push({ id: `W-R${r+1}-M${m+1}`, p1: null, p2: null, winner: null, loser: null, breaker: null, status: 'pending' });
            }
            tournamentData.winnersRounds.push(roundMatches);
        }

        tournamentData.losersRounds = [];
        let losersRoundCount = Math.max(1, (numWinnersRounds - 1) * 2);
        let currentLosersMatchCount = round1Matches.length / 2; 
        
        for(let r = 0; r < losersRoundCount; r++) {
            let roundMatches = [];
            for(let m = 0; m < currentLosersMatchCount; m++) {
                roundMatches.push({ id: `L-R${r+1}-M${m+1}`, p1: null, p2: null, winner: null, loser: null, breaker: null, status: 'pending' });
            }
            tournamentData.losersRounds.push(roundMatches);
            if (r % 2 === 1) currentLosersMatchCount /= 2;
        }

        tournamentData.grandFinal = { id: "GF-M1", p1: null, p2: null, winner: null, breaker: null, status: 'pending' };
    }

    function toggleMatchLive(type, rIdx, mIdx, matchId) {
        if (tournamentData.status !== "active") return; 

        let round = type === 'W' ? tournamentData.winnersRounds[rIdx] : (type === 'L' ? tournamentData.losersRounds[rIdx] : null);
        let match = round ? round[mIdx] : tournamentData.grandFinal;
        
        if (match.winner || !match.p1 || !match.p2 || match.p1 === "BYE" || match.p2 === "BYE") return;

        if (tournamentData.activeMatchId && tournamentData.activeMatchId !== matchId) {
            let prevMeta = tournamentData.activeMatchMetadata;
            let prevMatch = null;
            if (prevMeta.type === 'GF') prevMatch = tournamentData.grandFinal;
            else if (prevMeta.type === 'W') prevMatch = tournamentData.winnersRounds[prevMeta.roundIdx][prevMeta.matchIdx];
            else if (prevMeta.type === 'L') prevMatch = tournamentData.losersRounds[prevMeta.roundIdx][prevMeta.matchIdx];
            
            if (prevMatch && prevMatch.status === 'active') {
                alert("Please pause the current live match from the dashboard before selecting a new one.");
                return;
            }
        }

        if (tournamentData.activeMatchId === matchId) {
            match.status = match.status === 'paused' ? 'active' : 'paused';
            tournamentData.pendingWinner = null; 
        } else {
            match.status = 'active';
            tournamentData.activeMatchId = matchId;
            tournamentData.activeMatchMetadata = { type, roundIdx: rIdx, matchIdx: mIdx, id: matchId };
            tournamentData.pendingWinner = null;
        }
        
        updateLiveWidget();
        renderBracket();
        saveToLocalStorage(); 
    }

    function executeToss() {
        if (tournamentData.status !== "active") return;
        const meta = tournamentData.activeMatchMetadata;
        if (!meta) return;

        let m = null;
        if (meta.type === 'GF') m = tournamentData.grandFinal;
        else if (meta.type === 'W') m = tournamentData.winnersRounds[meta.roundIdx][meta.matchIdx];
        else if (meta.type === 'L') m = tournamentData.losersRounds[meta.roundIdx][meta.matchIdx];

        if (!m || m.winner || m.status === 'paused' || m.breaker) return;

        let players = [m.p1, m.p2];
        let randomBreaker = players[Math.floor(Math.random() * players.length)];
        
        m.breaker = randomBreaker;

        updateLiveWidget();
        renderBracket();
        saveToLocalStorage();
    }

        if (tournamentData.status === "completed") {

        else if (meta.type === 'L') { m = tournamentData.losersRounds[meta.roundIdx] ? tournamentData.losersRounds[meta.roundIdx][meta.matchIdx] : null; }

                <div id="resumeBtn" class="btn-success-widget" style="background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);">▶ Resume Match</div>
            `;

            selectGFWinner(pNum);
        } else {
            advancePlayer(meta.type, meta.roundIdx, meta.matchIdx, pNum);
        }
    }

    function advancePlayer(bracketType, roundIdx, matchIdx, playerNum) {
        if (tournamentData.status !== "active") return;

        let round = bracketType === 'W' ? tournamentData.winnersRounds[roundIdx] : tournamentData.losersRounds[roundIdx];
        let match = round[matchIdx];
        if (tournamentData.activeMatchId !== match.id) return; 

        let winner = playerNum === 1 ? match.p1 : match.p2;
        let loser = playerNum === 1 ? match.p2 : match.p1;
        if (!winner || winner === "BYE") return;

        match.winner = winner; match.loser = loser;
        match.status = 'completed';
        tournamentData.activeMatchId = null; 
        tournamentData.activeMatchMetadata = null;
        tournamentData.pendingWinner = null;
        
        updateLiveWidget();
        propagateBrackets(); 
        renderBracket();
        saveToLocalStorage();
        renderStatsTable();
    }

    function renderBracket() {
        renderGrid('winnersGrid', tournamentData.winnersRounds, 'W');
        renderGrid('losersGrid', tournamentData.losersRounds, 'L');
        renderGrandFinal();
        triggerGlobalLineRepaint(); 
    }

    function renderGrid(gridId, roundsData, bracketType) {
        const grid = document.getElementById(gridId);
        const svgElement = grid.querySelector('svg');
        grid.innerHTML = '';
        grid.appendChild(svgElement);

        roundsData.forEach((round, rIdx) => {
            const roundDiv = document.createElement('div');
            roundDiv.className = 'round';
            
            round.forEach((match, mIdx) => {
                const matchupDiv = document.createElement('div');
                let isLive = (match.status === 'active');
                let isPaused = (match.status === 'paused');
                let isDoneClass = (match.winner) ? 'completed-match' : '';
                
                let p1Class = match.winner === match.p1 && match.winner ? 'won' : (match.loser === match.p1 ? 'lost' : '');
                let p2Class = match.winner === match.p2 && match.winner ? 'won' : (match.loser === match.p2 ? 'lost' : '');
                
                matchupDiv.className = `matchup ${isLive ? 'in-progress' : ''} ${isPaused ? 'paused' : ''} ${isDoneClass}`;
                
                let p1Icon = match.breaker === match.p1 ? `<span class="breaker-icon">🎱</span>` : '';
                let p2Icon = match.breaker === match.p2 ? `<span class="breaker-icon">🎱</span>` : '';
                
                let p1Content = match.p1 ? `<span>${match.p1}</span>${p1Icon}` : `<span class="tbd-text">TBD</span>`;
                let p2Content = match.p2 ? `<span>${match.p2}</span>${p2Icon}` : `<span class="tbd-text">TBD</span>`;

                if(match.p1 === "BYE") p1Class = "bye";
                if(match.p2 === "BYE") p2Class = "bye";

                let statusText = isLive ? '• LIVE <span class="live-dot"></span>' : (isPaused ? '• PAUSED' : '');

                matchupDiv.innerHTML = `
                    <div id="title-${match.id}" class="match-title">${match.id} ${statusText}</div>
                    <div id="p1-${match.id}" class="player ${p1Class}">${p1Content}</div>
                    <div id="p2-${match.id}" class="player ${p2Class}">${p2Content}</div>
                `;
                grid.appendChild(roundDiv);
                roundDiv.appendChild(matchupDiv);

                document.getElementById(`title-${match.id}`).onclick = () => toggleMatchLive(bracketType, rIdx, mIdx, match.id);
            });
        });
    }

    function renderGrandFinal() {
        const grid = document.getElementById('grandFinalsGrid');
        grid.innerHTML = '';
        let gf = tournamentData.grandFinal;
        const roundDiv = document.createElement('div');
        roundDiv.className = 'round';

        let isLive = (gf.status === 'active');
        let isPaused = (gf.status === 'paused');
        let isDoneClass = (tournamentData.status === "completed") ? 'completed-match' : '';
        
        let p1Class = gf.winner === gf.p1 && gf.winner ? 'won' : (gf.loser === gf.p1 ? 'lost' : '');
        let p2Class = gf.winner === gf.p2 && gf.winner ? 'won' : (gf.loser === gf.p2 ? 'lost' : '');
        
        const matchupDiv = document.createElement('div');
        matchupDiv.className = `matchup ${isLive ? 'in-progress' : ''} ${isPaused ? 'paused' : ''} ${isDoneClass}`;
        
        let p1Icon = gf.breaker === gf.p1 ? `<span class="breaker-icon">🎱</span>` : '';
        let p2Icon = gf.breaker === gf.p2 ? `<span class="breaker-icon">🎱</span>` : '';

        let p1Content = gf.p1 ? `<span>${gf.p1}</span>${p1Icon}` : `<span class="tbd-text">Winners Champion</span>`;
        let p2Content = gf.p2 ? `<span>${gf.p2}</span>${p2Icon}` : `<span class="tbd-text">Losers Champion</span>`;

        let customTitle = tournamentData.bracketResetPlayed ? "Grand Final (Reset Match)" : "Grand Final (Round 1)";
        let statusText = isLive ? '• LIVE <span class="live-dot"></span>' : (isPaused ? '• PAUSED' : '');

        matchupDiv.innerHTML = `
            <div id="title-${gf.id}" class="match-title">${customTitle} ${statusText}</div>
            <div id="p1-${gf.id}" class="player ${p1Class}">${p1Content}</div>
            <div id="p2-${gf.id}" class="player ${p2Class}">${p2Content}</div>
        `;
        roundDiv.appendChild(matchupDiv);
        grid.appendChild(roundDiv);

        document.getElementById(`title-${gf.id}`).onclick = () => toggleMatchLive('GF', 0, 0, gf.id);
    }

    function selectGFWinner(playerNum) {
        if (tournamentData.status !== "active") return;

        let gf = tournamentData.grandFinal;
        if(!gf.p1 || !gf.p2 || tournamentData.activeMatchId !== gf.id) return;
        
        let matchWinner = playerNum === 1 ? gf.p1 : gf.p2;
        let matchLoser = playerNum === 1 ? gf.p2 : gf.p1;
        
        if (matchWinner === gf.p1 || tournamentData.bracketResetPlayed) {
            gf.winner = matchWinner;
            gf.loser = matchLoser;
            gf.status = 'completed';
            tournamentData.status = "completed"; 
            tournamentData.activeMatchId = null; 
            tournamentData.activeMatchMetadata = null;
            tournamentData.pendingWinner = null;
            applyLifecycleUIChanges();
            updateLiveWidget();
            renderBracket();
            saveToLocalStorage();
            renderStatsTable();
        } else {
            tournamentData.bracketResetPlayed = true; 
            tournamentData.activeMatchId = null; 
            tournamentData.activeMatchMetadata = null;
            tournamentData.pendingWinner = null;
            
            gf.winner = null;
            gf.loser = null;
            gf.breaker = null;
            gf.status = 'pending';
            
            updateLiveWidget();
            renderBracket();
            saveToLocalStorage();
            renderStatsTable();
            alert(`🔄 Bracket Reset! ${matchWinner} forced the true final Bracket Reset match!`);
        }
    }

    window.onload = loadFromLocalStorage;
</script>
</body>
</html>
